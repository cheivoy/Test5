<html lang="zh-TW"><head>
    <meta charset="UTF-8">
    <title>NSH 戰績系統 Pro v6.2 - 精準分析版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f5f6f8; --sidebar: #ffffff; --card: #ffffff;
            --text: #5a6473; --accent: #8e9aaf; --accent-soft: #d1d9e6;
            --border: #edf0f2; --danger: #e57373; --gold: #fbc02d; --win: #66bb6a;
            --color-碎夢: #5b9bd5; --color-神相: #4fc3f7; --color-血河: #e57373;
            --color-九靈: #ba68c8; --color-玄機: #fdd835; --color-龍吟: #81c784;
            --color-鐵衣: #ffb74d; --color-素問: #f06292; --color-潮光: #4dd0e1;
        }
        * { box-sizing: border-box; }
        body { margin: 0; display: flex; background: var(--bg); color: var(--text); font-family: "PingFang TC", sans-serif; height: 100vh; overflow: hidden; }
        
        /* 側邊欄 */
        .sidebar { width: 300px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        .nav-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .nav-item:hover { background: #f0f2f5; }
        .nav-item.active { background: var(--accent-soft); font-weight: bold; }
        
        /* 歷史記錄過濾器 */
        .search-box { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 12px; }
        .search-box select, .search-box input { width: 100%; margin-top: 5px; padding: 5px; border: 1px solid #ddd; border-radius: 4px; }
        
        .history-list { flex: 1; overflow-y: auto; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .hist-card { font-size: 11px; padding: 10px; background: #fff; border-radius: 6px; margin-bottom: 8px; border: 1px solid var(--border); position: relative; cursor: pointer; }
        .hist-card.win { border-left: 4px solid var(--win); }
        .hist-card.loss { border-left: 4px solid var(--danger); }
        .del-btn { position: absolute; top: 5px; right: 5px; color: var(--danger); border: none; background: none; cursor: pointer; font-size: 16px; }

        /* 主內容區 */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .container { padding: 30px; max-width: 1500px; margin: 0 auto; width: 100%; }
        
        /* MVP 卡片 */
        .mvp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .mvp-card { background: white; padding: 10px; border-radius: 10px; border-left: 3px solid var(--gold); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .mvp-label { font-size: 10px; color: #999; }
        .mvp-name { font-weight: bold; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mvp-val { font-size: 11px; color: var(--accent); }

        /* 表格樣式 */
        .table-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 30px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1000px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #f8f9fa; }
        th { background: #fafbfc; cursor: pointer; position: sticky; top: 0; z-index: 10; }
        th:hover { background: #f0f2f5; }
        .job-tag { padding: 2px 6px; border-radius: 4px; color: white; font-size: 10px; font-weight: bold; }
        .hashtag-tag { background: #e0e0e0; padding: 2px 6px; border-radius: 10px; font-size: 10px; margin-right: 3px; }

        /* 按鈕與工具 */
        .btn { padding: 8px 16px; border-radius: 8px; border:none; cursor:pointer; font-size:13px; }
        .btn-primary { background:var(--accent); color:white; }
        .btn-success { background:var(--win); color:white; }
        .filter-group { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-btn { padding: 5px 12px; border-radius: 15px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 11px; }
        .filter-btn.active { background: var(--accent); color: white; }

        /* 彈窗 */
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:1000; }
        .modal-body { background:white; padding:30px; border-radius:20px; width:1000px; max-height: 90vh; overflow-y: auto; display:flex; gap:25px; }
        .member-hist-list { margin-top: 15px; font-size: 12px; }
        .member-hist-item { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        
        .share-links { margin: 15px 0; padding: 15px; background: #eef2f7; border-radius: 10px; display: none; border: 1px dashed var(--accent); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="font-size: 18px;" id="sys-title">NSH 戰績管理 Pro v6.2</h2>
        
        <div class="nav-item active" onclick="switchPage('report')">📊 戰報解析</div>
        <div class="nav-item" onclick="switchPage('db')">👥 成員檔案室</div>
        
        <div class="search-box">
            <strong>🔍 歷史紀錄搜尋</strong>
            <select id="hist-filter-range" onchange="loadHistoryList()">
                <option value="all">所有時間</option>
                <option value="7">最近一週</option>
                <option value="30">最近一個月</option>
                <option value="90">最近三個月</option>
            </select>
            <input type="text" id="hist-search-guild" placeholder="搜尋幫會名字..." oninput="loadHistoryList()">
            <div style="margin-top:5px; display:flex; gap:5px;">
                <label><input type="checkbox" id="check-win" checked="" onchange="loadHistoryList()"> 勝</label>
                <label><input type="checkbox" id="check-loss" checked="" onchange="loadHistoryList()"> 負</label>
            </div>
        </div>

        <div class="history-list" id="hist-items"></div>
    </div>

    <div class="main-content">
        <div class="container" id="page-report">
            <div style="background:#fff; padding:20px; border-radius:12px; margin-bottom:20px; border: 1px solid var(--border);">
                <div style="display:flex; gap:12px; align-items:center; flex-wrap: wrap;">
                    <input type="file" id="csv-input" hidden="" onchange="handleCSV(this.files[0])">
                    <button class="btn btn-primary admin-only" onclick="document.getElementById('csv-input').click()">📁 導入 CSV</button>
                    <input type="text" id="custom-title" placeholder="戰報標題" style="padding:7px; border:1px solid #ddd; border-radius:5px; width:200px;">
                    <input type="date" id="match-date" style="padding:6px; border:1px solid #ddd; border-radius:5px;">
                    <div class="admin-only" style="background:#f0f0f0; padding:5px 10px; border-radius:8px;">
                        結果：
                        <label><input type="radio" name="match-result" value="勝利" checked=""> 勝利</label>
                        <label><input type="radio" name="match-result" value="失敗"> 失敗</label>
                    </div>
                    <button class="btn btn-success admin-only" onclick="saveHistoryToDB()" id="save-btn" style="display:none;">💾 保存至資料庫</button>
                </div>
            </div>

            <div id="share-section" class="share-links">
                <p style="margin:0 0 10px 0; font-weight:bold; font-size:13px;">🔗 分享當前戰報：</p>
                <button class="btn btn-primary" style="font-size:11px;" onclick="copyShareLink('view')">📋 複製幫眾版 (唯讀)</button>
                <button class="btn admin-only" style="font-size:11px; background:#ddd;" onclick="copyShareLink('admin')">📋 複製管理版</button>
            </div>

            <div id="report-view" style="display:none;">
                <div id="job-filters" class="filter-group"></div>
                <h3 id="display-title"></h3>
                <div id="mvp-a" class="mvp-grid"></div>
                <div class="table-card"><table><thead><tr id="th-a"></tr></thead><tbody id="tbody-a"></tbody></table></div>
                <h3 id="name-b-title" style="color:#999; font-size:16px;"></h3>
                <div id="mvp-b" class="mvp-grid"></div>
                <div class="table-card"><table><thead><tr id="th-b"></tr></thead><tbody id="tbody-b"></tbody></table></div>
            </div>
        </div>

        <div class="container" id="page-db" style="display:none;">
            <div style="background:#fff; padding:20px; border-radius:12px; margin-bottom:20px; border: 1px solid var(--border);">
                <div style="display:flex; gap:15px; align-items:center;">
                    <input type="text" id="db-search-id" placeholder="搜尋成員 ID..." style="padding:8px; border:1px solid #ddd; border-radius:8px; width:250px;" oninput="fetchMembers()">
                    <select id="db-filter-range" style="padding:8px; border:1px solid #ddd; border-radius:8px;" onchange="fetchMembers()">
                        <option value="all">所有時間出席率</option>
                        <option value="7">最近一週出席率</option>
                        <option value="30">最近一個月出席率</option>
                        <option value="90">最近三個月出席率</option>
                    </select>
                </div>
                <div id="db-job-filters" class="filter-group" style="margin-top:15px;"></div>
                <div id="db-hashtag-filters" class="filter-group"></div>
            </div>

            <div class="table-card">
                <table id="member-table">
                    <thead>
                        <tr>
                            <th onclick="sortMemberTable('id')">玩家 ID ⇅</th>
                            <th onclick="sortMemberTable('last_job')">職業 ⇅</th>
                            <th onclick="sortMemberTable('hashtag')">分團標籤 ⇅</th>
                            <th onclick="sortMemberTable('matches')">參賽場次 ⇅</th>
                            <th onclick="sortMemberTable('rate')">出席率 ⇅</th>
                            <th>管理員評語</th>
                            <th class="admin-only">操作</th>
                        </tr>
                    </thead>
                    <tbody id="db-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-body" onclick="event.stopPropagation()">
            <div style="flex:1.2; text-align:center;">
                <canvas id="radarChart"></canvas>
                <div class="member-hist-list">
                    <h4 style="border-bottom:2px solid #eee; padding-bottom:5px;">個人歷史參與紀錄</h4>
                    <div id="m-history-items"></div>
                </div>
            </div>
            <div style="flex:1;">
                <h2 id="m-name" style="margin:0;"></h2>
                <div style="margin:10px 0; display:flex; gap:10px;">
                    <select id="m-edit-job" class="admin-only" style="padding:5px; border-radius:5px; border:1px solid #ddd;"><option value="碎夢">碎夢</option><option value="神相">神相</option><option value="血河">血河</option><option value="九靈">九靈</option><option value="玄機">玄機</option><option value="龍吟">龍吟</option><option value="鐵衣">鐵衣</option><option value="素問">素問</option><option value="潮光">潮光</option></select>
                    <select id="m-edit-hashtag" class="admin-only" style="padding:5px; border-radius:5px; border:1px solid #ddd;">
                        <option value="進攻團">進攻團</option>
                        <option value="防守團">防守團</option>
                        <option value="機動團">機動團</option>
                    </select>
                </div>
                <div id="m-stats-box" style="padding:15px; background:#f8f9fa; border-radius:10px; font-size:13px; line-height:1.6;"></div>
                <p style="margin-top:20px; font-weight:bold;">統戰評語：</p>
                <textarea id="m-note" style="width:100%; height:80px; border:1px solid #ddd; padding:10px; border-radius:8px;"></textarea>
                <div class="admin-only" style="margin-top:15px; display:flex; flex-direction:column; gap:10px;">
                    <button class="btn btn-primary" onclick="saveMemberFullInfo()">💾 儲存所有修改</button>
                    <button class="btn" style="background:#eee;" onclick="renameP(focusPlayer.id)">👤 修改玩家名稱</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const WORKER_URL = "https://d1-template.cherrycywong0907.workers.dev"; // 請確認與你的 Worker 網址一致
    let gA = [], gB = [], full = [], nameA = "", nameB = "", focusPlayer = null, chart = null, currentJobFilter = "all", currentHashtagFilter = "all", totalReports = 0, currentReportId = null;
    let allHistories = [], allMembers = [];

    const urlParams = new URLSearchParams(window.location.search);
    const isViewMode = urlParams.get('mode') === 'view';

    // 職業與顏色
    const jobColors = { "碎夢":"#5b9bd5", "神相":"#4fc3f7", "血河":"#e57373", "九靈":"#ba68c8", "玄機":"#fdd835", "龍吟":"#81c784", "鐵衣":"#ffb74d", "素問":"#f06292", "潮光":"#4dd0e1" };
    
    // 欄位定義
    const metrics = [
        {l:'擊敗最高', k:'kill'}, {l:'助攻最高', k:'assist'}, {l:'資源最高', k:'res'}, 
        {l:'傷害最高', k:'pDmg'}, {l:'對建最高', k:'bDmg'}, {l:'治療最高', k:'heal'}, 
        {l:'承傷最高', k:'takeDmg'}, {l:'重傷最高', k:'death'}, {l:'化羽最高', k:'spring'}
    ];
    const tableCols = [
        {l:'玩家名字', k:'name'}, {l:'職業', k:'job'}, {l:'擊敗', k:'kill'}, {l:'助攻', k:'assist'}, 
        {l:'資源', k:'res'}, {l:'對玩家傷害', k:'pDmg'}, {l:'對建築傷害', k:'bDmg'}, {l:'治療值', k:'heal'}, 
        {l:'承受傷害', k:'takeDmg'}, {l:'重傷', k:'death'}, {l:'化羽/清泉', k:'spring'}, {l:'焚骨', k:'bone'}
    ];

    window.onload = () => {
        if(isViewMode) {
            document.querySelectorAll('.admin-only').forEach(el => el.remove());
            document.getElementById('m-note').readOnly = true;
            document.getElementById('sys-title').innerText = "NSH 戰績查看版";
        }
        document.getElementById('match-date').valueAsDate = new Date();
        loadHistoryList().then(() => {
            const reportId = urlParams.get('id');
            if(reportId) viewHistory(reportId);
        });
        
        // 初始化職業下拉選單
        const jobSelect = document.getElementById('m-edit-job');
        Object.keys(jobColors).forEach(j => jobSelect.add(new Option(j, j)));
    };

    // CSV 處理功能
    function handleCSV(file) {
        if(!file) return;
        const parts = file.name.replace('.csv', '').split('_');
        if(parts.length >= 4) {
            const d = parts[0];
            document.getElementById('match-date').value = `${d.substring(0,4)}-${d.substring(4,6)}-${d.substring(6,8)}`;
            nameA = parts[2]; nameB = parts[3];
            document.getElementById('custom-title').value = `${nameA} VS ${nameB}`;
        }
        const reader = new FileReader();
        reader.onload = e => {
            const lines = e.target.result.split('\n');
            let mode = 'A'; gA = []; gB = [];
            for(let i=2; i<lines.length; i++){
                const row = lines[i].trim();
                if(!row) { if(lines[i+1]?.includes(',') || lines[i+2]?.includes(',')) { mode = 'B'; i+=2; } continue; }
                const c = row.split(',').map(v => v.replace(/"/g,''));
                if(c.length < 10) continue;
                // CSV 索引解析 (請根據你的 CSV 欄位順序微調)
                const p = { 
                    name:c[0], job:c[1], kill:+c[2], assist:+c[3], res:+c[4]||0, 
                    pDmg:+c[5], bDmg:+c[6], heal:+c[7], takeDmg:+c[8], 
                    death:+c[9], spring:+c[10], bone:+c[11]||0 
                };
                if(mode==='A') gA.push(p); else gB.push(p);
            }
            full = [...gA, ...gB];
            document.getElementById('save-btn').style.display = 'block';
            renderFilterButtons(); renderReport();
        };
        reader.readAsText(file);
    }

    // 保存與刪除
    async function saveHistoryToDB() {
        const id = "rep_" + Date.now();
        const resValue = document.querySelector('input[name="match-result"]:checked').value;
        const payload = {
            id,
            fullDateTime: document.getElementById('match-date').value,
            nameA: document.getElementById('custom-title').value,
            nameB: nameB,
            result: resValue,
            rawData: { nameA: document.getElementById('custom-title').value, nameB, gA, gB, result: resValue }
        };
        const res = await fetch(WORKER_URL + "/api/save-history", { method:'POST', body: JSON.stringify(payload) });
        if(res.ok) { alert("保存成功！"); currentReportId = id; showShareSection(); loadHistoryList(); }
    }

    async function loadHistoryList() {
        const res = await fetch(WORKER_URL + "/api/histories");
        allHistories = await res.json();
        
        const range = document.getElementById('hist-filter-range').value;
        const search = document.getElementById('hist-search-guild').value.toLowerCase();
        const winCheck = document.getElementById('check-win').checked;
        const lossCheck = document.getElementById('check-loss').checked;

        const filtered = allHistories.filter(h => {
            const hDate = new Date(h.date);
            const diffDays = (new Date() - hDate) / (1000*60*60*24);
            const dateMatch = range === 'all' || diffDays <= parseInt(range);
            const nameMatch = h.guild_a.toLowerCase().includes(search);
            const resultMatch = (h.result === '勝利' && winCheck) || (h.result === '失敗' && lossCheck);
            return dateMatch && nameMatch && resultMatch;
        });

        document.getElementById('hist-items').innerHTML = filtered.map(h => `
            <div class="hist-card ${h.result === '勝利' ? 'win' : 'loss'}" onclick="viewHistory('${h.id}')">
                ${!isViewMode ? `<button class="del-btn" onclick="deleteHist(event, '${h.id}')">×</button>` : ''}
                <div style="display:flex; justify-content:space-between;">
                    <b>${h.date}</b> <span style="color:${h.result==='勝利'?'green':'red'}">${h.result}</span>
                </div>
                ${h.guild_a}
            </div>`).join('');
    }

    async function deleteHist(e, id) {
        e.stopPropagation();
        if(!confirm("確定刪除此戰報並扣除成員累計數據？")) return;
        await fetch(WORKER_URL + "/api/delete-history", { method:'POST', body: JSON.stringify({id}) });
        loadHistoryList();
    }

    // 戰報顯示渲染
    function renderReport() {
        document.getElementById('report-view').style.display = 'block';
        renderMVPs('a', gA); renderMVPs('b', gB);
        const avg = full.reduce((a,b)=>a+b.pDmg,0)/full.length;

        ['a','b'].forEach(t => {
            const data = (t==='a'?gA:gB).filter(p => currentJobFilter==='all' || p.job===currentJobFilter);
            document.getElementById('th-'+t).innerHTML = tableCols.map(c => `<th onclick="sortReportTable('${t}', '${c.k}')">${c.l}</th>`).join('');
            document.getElementById('tbody-'+t).innerHTML = data.map(p => `
                <tr onclick="openMemberModal('${p.name}')" style="cursor:pointer;">
                    <td>${p.name} ${p.pDmg > avg*2.5 ? '🔥':''}</td>
                    <td><span class="job-tag" style="background:${jobColors[p.job]}">${p.job}</span></td>
                    <td>${p.kill}</td><td>${p.assist}</td><td>${p.res}</td>
                    <td>${(p.pDmg/10000).toFixed(1)}w</td><td>${(p.bDmg/10000).toFixed(1)}w</td>
                    <td>${(p.heal/10000).toFixed(1)}w</td><td>${(p.takeDmg/10000).toFixed(1)}w</td>
                    <td>${p.death}</td><td>${p.spring}</td><td>${p.bone}</td>
                </tr>`).join('');
        });
    }

    function renderMVPs(team, players) {
        document.getElementById('mvp-' + team).innerHTML = metrics.map(m => {
            const top = [...players].sort((a,b) => b[m.k] - a[m.k])[0];
            return top ? `<div class="mvp-card"><div class="mvp-label">${m.l}</div><div class="mvp-name">${top.name}</div><div class="mvp-val">${top[m.k]>=10000?(top[m.k]/10000).toFixed(1)+'w':top[m.k]}</div></div>` : '';
        }).join('');
    }

    // 成員檔案室功能
    async function fetchMembers() {
        const res = await fetch(WORKER_URL + "/api/members");
        allMembers = await res.json();
        
        const range = document.getElementById('db-filter-range').value;
        const searchId = document.getElementById('db-search-id').value.toLowerCase();
        
        // 計算該時間範圍內的總戰報數
        const rangeHistories = allHistories.filter(h => {
            const diff = (new Date() - new Date(h.date)) / (1000*60*60*24);
            return range === 'all' || diff <= parseInt(range);
        });
        const currentTotal = rangeHistories.length;

        let filtered = allMembers.filter(m => {
            const jobMatch = currentJobFilter === 'all' || m.last_job === currentJobFilter;
            const tagMatch = currentHashtagFilter === 'all' || m.hashtag === currentHashtagFilter;
            const idMatch = m.id.toLowerCase().includes(searchId);
            return jobMatch && tagMatch && idMatch;
        });

        // 渲染過濾按鈕
        renderDBFilterButtons();

        document.getElementById('db-table-body').innerHTML = filtered.map(m => {
            const rate = currentTotal > 0 ? ((m.matches/currentTotal)*100).toFixed(1) : 0;
            return `
            <tr onclick="openMemberModal('${m.id}')" style="cursor:pointer">
                <td><b>${m.id}</b></td>
                <td><span class="job-tag" style="background:${jobColors[m.last_job]}">${m.last_job}</span></td>
                <td><span class="hashtag-tag">${m.hashtag || '未分類'}</span></td>
                <td>${m.matches} 場</td>
                <td>${rate}%</td>
                <td style="font-size:11px; color:#888;">${m.note || ''}</td>
                <td class="admin-only">
                    <button class="btn btn-outline" style="padding:2px 8px; font-size:10px;" onclick="event.stopPropagation(); renameP('${m.id}')">更名</button>
                </td>
            </tr>`;
        }).join('');
    }

    function renderDBFilterButtons() {
        const jobs = ["all", ...Object.keys(jobColors)];
        document.getElementById('db-job-filters').innerHTML = jobs.map(j => `<button class="filter-btn ${currentJobFilter===j?'active':''}" onclick="setDBJobFilter('${j}')">${j==='all'?'全部職業':j}</button>`).join('');
        
        const tags = ["all", "進攻團", "防守團", "機動團"];
        document.getElementById('db-hashtag-filters').innerHTML = tags.map(t => `<button class="filter-btn ${currentHashtagFilter===t?'active':''}" onclick="setDBTagFilter('${t}')">${t==='all'?'全部標籤':t}</button>`).join('');
    }

    // 彈窗詳情與雷達圖
    async function openMemberModal(name) {
        focusPlayer = allMembers.find(m => m.id === name) || { id: name, last_job: '碎夢', hashtag: '進攻團', note: '' };
        document.getElementById('modal').style.display='flex';
        document.getElementById('m-name').innerText = focusPlayer.id;
        document.getElementById('m-note').value = focusPlayer.note || '';
        document.getElementById('m-edit-job').value = focusPlayer.last_job;
        document.getElementById('m-edit-hashtag').value = focusPlayer.hashtag || '進攻團';

        // 找出該玩家的所有參與記錄
        const personalHist = [];
        allHistories.forEach(h => {
            const d = JSON.parse(h.raw_json);
            const pData = [...d.gA, ...d.gB].find(x => x.name === name);
            if(pData) personalHist.push({ date: h.date, result: h.result, guild: h.guild_a, ...pData });
        });

        document.getElementById('m-history-items').innerHTML = personalHist.map(ph => `
            <div class="member-hist-item">
                <span>${ph.date} (${ph.result})</span>
                <span style="color:#888">${ph.job} | 傷:${(ph.pDmg/10000).toFixed(1)}w</span>
            </div>
        `).join('');

        // 動態雷達圖邏輯
        renderRadar(focusPlayer.last_job, personalHist);
    }

    function renderRadar(job, history) {
        let labels = [], keys = [];
        if(job === '素問') {
            labels = ['助攻', '資源', '治療值', '承受傷害', '重傷', '化羽/清泉'];
            keys = ['assist', 'res', 'heal', 'takeDmg', 'death', 'spring'];
        } else if(job === '潮光') {
            labels = ['擊敗', '助攻', '資源', '對玩家傷害', '對建築傷害', '承受傷害', '重傷', '化羽/清泉'];
            keys = ['kill', 'assist', 'res', 'pDmg', 'bDmg', 'takeDmg', 'death', 'spring'];
        } else if(job === '九靈') {
            labels = ['擊敗', '助攻', '資源', '對玩家傷害', '對建築傷害', '承受傷害', '重傷', '焚骨'];
            keys = ['kill', 'assist', 'res', 'pDmg', 'bDmg', 'takeDmg', 'death', 'bone'];
        } else {
            labels = ['擊敗', '助攻', '資源', '對玩家傷害', '對建築傷害', '承受傷害', '重傷'];
            keys = ['kill', 'assist', 'res', 'pDmg', 'bDmg', 'takeDmg', 'death'];
        }

        // 計算平均值
        const avgData = keys.map(k => {
            const sum = history.reduce((a, b) => a + (b[k] || 0), 0);
            return history.length > 0 ? sum / history.length : 0;
        });

        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('radarChart'), {
            type:'radar',
            data:{ labels, datasets:[{ label:'綜合能力(平均)', data: avgData, backgroundColor:'rgba(142,154,175,0.2)', borderColor:'#8e9aaf' }] },
            options:{ scales:{ r:{ ticks:{display:false} } } }
        });
    }

    async function saveMemberFullInfo() {
        const payload = {
            id: focusPlayer.id,
            job: document.getElementById('m-edit-job').value,
            hashtag: document.getElementById('m-edit-hashtag').value,
            note: document.getElementById('m-note').value
        };
        await fetch(WORKER_URL + "/api/update-member-full", { method:'POST', body: JSON.stringify(payload) });
        alert("資料已更新！");
        fetchMembers(); closeModal();
    }

    // 其他工具
    function switchPage(p) {
        document.getElementById('page-report').style.display = p==='report'?'block':'none';
        document.getElementById('page-db').style.display = p==='db'?'block':'none';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if(p==='db') { fetchMembers(); document.querySelectorAll('.nav-item')[1].classList.add('active'); }
        else document.querySelectorAll('.nav-item')[0].classList.add('active');
    }

    function viewHistory(id) {
        currentReportId = id;
        const h = allHistories.find(x => x.id === id);
        if(h) {
            const d = JSON.parse(h.raw_json);
            gA = d.gA; gB = d.gB; full = [...gA, ...gB];
            document.getElementById('display-title').innerText = d.nameA + ` (${h.result})`;
            document.getElementById('name-b-title').innerText = "敵軍：" + d.nameB;
            switchPage('report'); renderFilterButtons(); renderReport(); showShareSection();
        }
    }

    function showShareSection() { document.getElementById('share-section').style.display = 'block'; }
    
    function copyShareLink(mode) {
        const url = new URL(window.location.href.split('?')[0]);
        url.searchParams.set('id', currentReportId);
        if(mode === 'view') url.searchParams.set('mode', 'view');
        navigator.clipboard.writeText(url.toString());
        alert("鏈結已複製！此鏈結已包含當前戰報 ID 與權限設定。");
    }

    function renameP(old) { const n = prompt("輸入新名稱:", old); if(n) fetch(WORKER_URL + "/api/rename", { method:'POST', body: JSON.stringify({oldId:old, newId:n}) }).then(()=>fetchMembers()); }
    function setDBJobFilter(j) { currentJobFilter = j; fetchMembers(); }
    function setDBTagFilter(t) { currentHashtagFilter = t; fetchMembers(); }
    function closeModal() { document.getElementById('modal').style.display='none'; }
    function sortReportTable(t, k) { (t==='a'?gA:gB).sort((a,b)=>b[k]-a[k]); renderReport(); }
    function sortMemberTable(k) { allMembers.sort((a,b)=> (b[k]||0) > (a[k]||0) ? 1 : -1); fetchMembers(); }
</script>

</body></html>
